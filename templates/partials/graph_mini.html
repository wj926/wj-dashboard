<div class="gm" id="gm-{{ uid|default('1') }}">
  <svg></svg>
  <div class="gm-legend">노드 크기 = 활동량 · 색 = 카테고리 · 드래그 가능</div>
</div>
<script>
(function(){
  if (typeof d3 === 'undefined') { return; }
  const data = {{ {"nodes": data.nodes, "edges": data.edges}|tojson }};
  const wrap = document.getElementById("gm-{{ uid|default('1') }}");
  const svg = d3.select(wrap.querySelector("svg"));
  const W = wrap.getBoundingClientRect().width || 400, H = 280;
  svg.attr("viewBox", `0 0 ${W} ${H}`);
  const g = svg.append("g");
  svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));
  const nodes = data.nodes.map(n=>({...n}));
  const edges = data.edges.map(e=>({...e}));
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(edges).id(d=>d.id).distance(90))
    .force("charge", d3.forceManyBody().strength(-220))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("collide", d3.forceCollide().radius(d => 18 + d.weight*0.8));
  const link = g.append("g").selectAll("line").data(edges).join("line").attr("stroke","#475569").attr("stroke-opacity",0.55);
  const color = d3.scaleOrdinal(d3.schemeTableau10);
  const node = g.append("g").selectAll("g").data(nodes).join("g")
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append("circle").attr("r", d=>12+d.weight*0.6).attr("fill", d=>color(d.category)).attr("stroke","#0e1626").attr("stroke-width",1.5);
  node.append("text").text(d=>d.title).attr("text-anchor","middle").attr("dy",3).attr("font-size","9px").attr("fill","#f1f5f9").style("pointer-events","none").style("font-weight","700");
  sim.on("tick", () => {
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("transform", d=>`translate(${d.x},${d.y})`);
  });
})();
</script>
