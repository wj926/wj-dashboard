<!DOCTYPE html>
<html lang="ko"><head>
{% include "combos/_base_head.html" %}
<title>시각 트리 5종</title>
</head><body>
<div class="cb-header">
  <span><a href="/tree-trackers">← 텍스트 트리</a> · <a href="/today">오늘 정리</a></span>
  <span class="name">🎨 시각 트리 후보 5개</span>
  <span></span>
</div>
<div class="tree-wrap" style="text-align:center;">
  <h1 style="font-size:1.6rem;color:var(--navy);margin:18px 0 4px;">🎨 시각화된 트리 5종</h1>
  <p style="color:var(--muted);margin:0 0 18px;font-size:0.92rem;">이전 텍스트 들여쓰기 트리는 한계. 진짜 박스/연결선/방사형/면적으로.</p>
</div>
<div class="combo-card-grid">
  {% for v in vis_list %}
    <a class="combo-tile" href="/tree-vis/{{ v.id }}">
      <span class="code">{{ v.tag }}</span>
      <h3>{{ v.name }}</h3>
      <p>{{ v.desc }}</p>
    </a>
  {% endfor %}
</div>
</body></html>
